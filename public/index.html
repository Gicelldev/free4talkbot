<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free4Talk Bot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <div class="logo">Free4Talk Bot Dashboard</div>
        <div id="statusBadge" class="status-badge">
            <div class="status-dot"></div>
            <span id="statusText">OFFLINE</span>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Configuration
                </div>
                <div class="input-group">
                    <label>Bot Name</label>
                    <input type="text" id="botName" placeholder="e.g. Music Bot Pro" value="Music Bot Pro">
                </div>
                <div class="input-group">
                    <label>Room URL</label>
                    <input type="text" id="roomUrl" placeholder="https://www.free4talk.com/room/..."
                        value="https://www.free4talk.com/room/Baf63?key=688896">
                </div>
                <div class="input-group">
                    <label>Auth Storage (JSON)</label>
                    <textarea id="authData" placeholder="Paste your auth_storage.json content here..."></textarea>
                </div>
                <button id="startBtn" class="btn btn-primary">Start Bot</button>
                <button id="stopBtn" class="btn btn-stop hidden">Stop Bot</button>
            </div>

            <div class="card" style="margin-top: 20px;">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                    Now Playing
                </div>
                <div id="nowPlaying" class="now-playing">
                    <div class="song-info">
                        <div id="songTitle" class="song-title">Nothing playing</div>
                        <div id="songStatus" class="song-status">Idle</div>
                    </div>
                </div>
                <div class="controls">
                    <button id="skipBtn" class="control-btn">Skip</button>
                    <button id="stopMusicBtn" class="control-btn">Stop Music</button>
                </div>
                <div class="input-group" style="margin-top: 20px;">
                    <label>Volume</label>
                    <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="0.1">
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="card" style="height: 100%; display: flex; flex-direction: column;">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"></polyline>
                        <line x1="12" y1="19" x2="20" y2="19"></line>
                    </svg>
                    Live Logs
                </div>
                <div id="console" class="console"></div>

                <div class="input-group" style="margin-top: 20px;">
                    <label>Quick Command</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="cmdInput" placeholder="!play song name...">
                        <button id="sendCmdBtn" class="btn btn-primary"
                            style="width: auto; padding: 0 20px;">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
